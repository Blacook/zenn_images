<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" style="font-family:'Helvetica Neue',Arial,sans-serif;background:#F8FAFC;border-radius:12px;border:1.5px solid #E2E8F0;display:block;margin:16px auto;max-width:720px;">
  <defs>
    <marker id="ax1" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,1 L6,3.5 L0,6 Z" fill="#475569"/></marker>
    <marker id="ay1" markerWidth="7" markerHeight="7" refX="3.5" refY="6" orient="auto"><path d="M1,7 L3.5,1 L6,7 Z" fill="#475569"/></marker>
  </defs>
  <!-- === LEFT PANEL: V_love === -->
  <!-- Panel background -->
  <rect x="10" y="10" width="340" height="310" rx="8" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1.2"/>
  <!-- Panel title -->
  <text x="180" y="30" fill="#0369A1" font-size="13" font-weight="bold" text-anchor="middle">愛のポテンシャル</text>
  <text x="180" y="44" fill="#0284C7" font-size="11" text-anchor="middle">V_love(r) = −α/r + σr</text>
  <!-- Axes left panel: graph area x=50..310, y=55..300 -->
  <line x1="50" y1="300" x2="315" y2="300" stroke="#475569" stroke-width="1.5" marker-end="url(#ax1)"/>
  <line x1="50" y1="300" x2="50" y2="52" stroke="#475569" stroke-width="1.5" marker-end="url(#ay1)"/>
  <text x="316" y="304" fill="#475569" font-size="10">r →</text>
  <text x="30" y="175" fill="#475569" font-size="10" text-anchor="middle" transform="rotate(-90,30,175)">V(r)</text>
  <!-- V=0 reference line: y=117 mapped to panel offset. 
       Panel y-offset: graph area y top=55, bot=300. In our coordinate system: y=30+55-30=55 to y=300.
       V_love zero line at y=117 in 0..290 space -> adjust for panel offset +10 top. Actually I'll use direct coords.
       For this SVG the graph y maps: V=-6 at y=300 (bottom), V=+3 at y=55 (top)
       Zero (V=0): y = 300 - (6/9)*245 = 300 - 163.3 = 136.7 ≈ 137 -->
  <line x1="50" y1="137" x2="310" y2="137" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="40" y="140" fill="#94A3B8" font-size="9" text-anchor="end">V=0</text>
  <!-- σr component: straight line from (50,137) to (310,75) -->
  <!-- r=0: V=0 -> y=137; r=4.5: V=2.25 -> y=300-(8.25/9)*245=300-224.6=75.4≈75 -->
  <line x1="50" y1="137" x2="310" y2="75" stroke="#10B981" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.8"/>
  <!-- -α/r component polyline: r=0.4->y=280,r=0.6->y=233,r=0.8->y=208,r=1->y=192,r=1.5->y=172,r=2->y=163,r=3->y=154,r=4.5->y=147 -->
  <!-- SVG_y = 300 - ((V+6)/9)*245; x same as main curve -->
  <polyline points="73,280 85,233 96,208 108,192 137,172 166,163 223,154 310,147"
            fill="none" stroke="#F97316" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.8"/>
  <!-- Main V_love curve (blue, bold) -->
  <!-- Points: 73,255->79,225->85,204->90,189->96,177->108,160->119,147->137,134->166,117->194,104->223,93->252,83->281,73->310,65 -->
  <!-- Adjust for panel: these were computed for y range 30..290. Now graph y area is 55..300, span=245. Need rescale.
       Original: y_top=30, y_bot=290, span=260; V from -6 to +3 (span 9)
       New: y_top=55, y_bot=300, span=245; same V range
       New_y = 300 - ((V+6)/9)*245
       r=0.4, V=-4.8: y=300-(1.2/9)*245=300-32.7=267
       r=0.5, V=-3.75: y=300-(2.25/9)*245=300-61.3=238.7→239
       r=0.6, V=-3.03: y=300-(2.97/9)*245=300-80.9=219
       r=0.8, V=-2.1: y=300-(3.9/9)*245=300-106.3=193.7→194
       r=1.0, V=-1.5: y=300-(4.5/9)*245=300-122.5=177.5→178
       r=1.2, V=-1.07: y=300-(4.93/9)*245=300-134.3=165.7→166
       r=1.5, V=-0.58: y=300-(5.42/9)*245=300-147.7=152.3→152
       r=2.0, V=0: y=137
       r=2.5, V=0.45: y=300-(6.45/9)*245=300-175.7=124.3→124
       r=3.0, V=0.83: y=300-(6.83/9)*245=300-186=114
       r=4.5, V=1.81: y=300-(7.81/9)*245=300-212.7=87.3→87 -->
  <polyline points="73,267 79,239 85,219 96,194 108,178 119,166 137,152 166,137 194,124 223,114 252,103 281,93 310,87"
            fill="none" stroke="#3B82F6" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Labels for components -->
  <text x="92" y="260" fill="#F97316" font-size="9" text-anchor="start">−α/r</text>
  <text x="295" y="72" fill="#10B981" font-size="9" text-anchor="end">σr</text>
  <!-- Annotation -->
  <text x="270" y="108" fill="#1D4ED8" font-size="9" text-anchor="middle">∞ に上昇→離れても</text>
  <text x="270" y="119" fill="#1D4ED8" font-size="9" text-anchor="middle">エネルギーが増し続ける</text>
  <!-- Legend -->
  <line x1="60" y1="318" x2="90" y2="318" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="95" y="322" fill="#374151" font-size="9">合成ポテンシャル</text>
  <line x1="60" y1="333" x2="90" y2="333" stroke="#F97316" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="95" y="337" fill="#374151" font-size="9">−α/r（クーロン項）</text>
  <line x1="180" y1="333" x2="210" y2="333" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="215" y="337" fill="#374151" font-size="9">σr（線形項）</text>
  <!-- === RIGHT PANEL: V_hate === -->
  <rect x="370" y="10" width="340" height="310" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.2"/>
  <text x="540" y="30" fill="#C2410C" font-size="13" font-weight="bold" text-anchor="middle">憎のポテンシャル</text>
  <text x="540" y="44" fill="#EA580C" font-size="11" text-anchor="middle">V_hate(r) = +α/r + σr</text>
  <!-- Axes right panel: graph area x=407..680, y=55..300 -->
  <line x1="407" y1="300" x2="685" y2="300" stroke="#475569" stroke-width="1.5" marker-end="url(#ax1)"/>
  <line x1="407" y1="300" x2="407" y2="52" stroke="#475569" stroke-width="1.5" marker-end="url(#ay1)"/>
  <text x="686" y="304" fill="#475569" font-size="10">r →</text>
  <text x="388" y="175" fill="#475569" font-size="10" text-anchor="middle" transform="rotate(-90,388,175)">V(r)</text>
  <!-- V_hate curve points adjustment:
       V range 1.0 to 6.0 (span 5), graph y 55..300 (span 245)
       SVG_y = 300 - ((V-1.0)/5)*245
       r=0.4, V=5.2: y=300-(4.2/5)*245=300-205.8=94.2→94
       r=0.5, V=4.25: y=300-(3.25/5)*245=300-159.3=140.7→141
       r=0.6, V=3.63: y=300-(2.63/5)*245=300-128.9=171.1→171
       r=0.7, V=3.21: y=300-(2.21/5)*245=300-108.3=191.7→192
       r=0.8, V=2.9:  y=300-(1.9/5)*245=300-93.1=206.9→207
       r=1.0, V=2.5:  y=300-(1.5/5)*245=300-73.5=226.5→227
       r=1.2, V=2.27: y=300-(1.27/5)*245=300-62.2=237.8→238
       r=1.5, V=2.08: y=300-(1.08/5)*245=300-52.9=247.1→247
       r=2.0, V=2.0:  y=300-(1.0/5)*245=300-49=251  <- MINIMUM
       r=2.5, V=2.05: y=300-(1.05/5)*245=300-51.5=248.5→249
       r=3.0, V=2.17: y=300-(1.17/5)*245=300-57.3=242.7→243
       r=3.5, V=2.32: y=300-(1.32/5)*245=300-64.7=235.3→235
       r=4.0, V=2.5:  y=300-73.5=226.5→227
       r=4.5, V=2.69: y=300-(1.69/5)*245=300-82.8=217.2→217
       x values same as before (380→680 mapped to 407..680): 
       offset correction: original x=380..680, new graph x=407..680
       ratio: (x_orig - 380) * (680-407)/(680-380) + 407 = (x_orig-380)*0.91+407
       r=0.4: orig_x=407, new=(407-380)*0.91+407=407+24.6=407... wait that's off
       Let me just rescale. r from 0 to 4.5, x from 407 to 680 (span=273)
       SVG_x = 407 + (r/4.5)*273 -->
  <!-- r=0.4: x=407+24.3=431, r=0.5: x=407+30.3=437.3, r=0.6:x=407+36.4=443.4
       r=0.7:x=449.5, r=0.8:x=455.6, r=1.0:x=407+60.7=467.7, r=1.2:x=479.8
       r=1.5:x=498, r=2.0:x=528.3, r=2.5:x=558.7, r=3.0:x=589, r=3.5:x=619.3, r=4.0:x=649.7, r=4.5:x=680 -->
  <polyline points="431,94 437,141 443,171 450,192 456,207 468,227 480,238 498,247 528,251 559,249 589,243 619,235 650,227 680,217"
            fill="none" stroke="#EF4444" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Minimum annotation: r0=2.0, x=528, y=251 -->
  <line x1="528" y1="251" x2="528" y2="300" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="528" cy="251" r="5" fill="#7C3AED" fill-opacity="0.8"/>
  <text x="528" y="316" fill="#7C3AED" font-size="10" font-weight="bold" text-anchor="middle">r₀ = √(α/σ)</text>
  <text x="528" y="329" fill="#7C3AED" font-size="9" text-anchor="middle">最適距離</text>
  <!-- +α/r annotation -->
  <text x="445" y="80" fill="#C2410C" font-size="9.5" text-anchor="middle">近距離で強烈反発</text>
  <text x="445" y="92" fill="#C2410C" font-size="9">+α/r → ∞</text>
  <!-- Right side rise annotation -->
  <text x="640" y="200" fill="#92400E" font-size="9" text-anchor="middle">遠距離でも</text>
  <text x="640" y="211" fill="#92400E" font-size="9" text-anchor="middle">呪縛が残る</text>
  <text x="640" y="222" fill="#92400E" font-size="9" text-anchor="middle">+σr</text>
</svg>