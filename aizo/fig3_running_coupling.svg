<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" style="font-family:'Helvetica Neue',Arial,sans-serif;background:#F8FAFC;border-radius:12px;border:1.5px solid #E2E8F0;display:block;margin:16px auto;max-width:680px;">
  <defs>
    <marker id="arrowX" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,1 L6,3.5 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowY" markerWidth="7" markerHeight="7" refX="3.5" refY="6" orient="auto">
      <path d="M1,7 L3.5,1 L6,7 Z" fill="#475569"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="340" y="18" fill="#0F172A" font-size="13" font-weight="bold" text-anchor="middle">走る結合定数 α_s(Q²)：近距離では自由、遠距離では束縛</text>
  <!-- Background regions -->
  <rect x="70" y="28" width="143" height="222" fill="#FEF2F2" rx="4"/>
  <rect x="213" y="28" width="397" height="222" fill="#EFF6FF" rx="4"/>
  <!-- Region labels -->
  <text x="141" y="46" fill="#DC2626" font-size="11" font-weight="bold" text-anchor="middle">閉じ込め領域</text>
  <text x="141" y="59" fill="#B91C1C" font-size="9.5" text-anchor="middle">遠距離 / 低エネルギー</text>
  <text x="411" y="46" fill="#2563EB" font-size="11" font-weight="bold" text-anchor="middle">漸近的自由領域</text>
  <text x="411" y="59" fill="#1D4ED8" font-size="9.5" text-anchor="middle">近距離 / 高エネルギー</text>
  <!-- Boundary line at Q ~ 3 GeV -->
  <line x1="213" y1="28" x2="213" y2="250" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Grid lines -->
  <line x1="70" y1="80" x2="610" y2="80" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="70" y1="140" x2="610" y2="140" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="70" y1="200" x2="610" y2="200" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Axes -->
  <line x1="70" y1="250" x2="615" y2="250" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowX)"/>
  <line x1="70" y1="250" x2="70" y2="25" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowY)"/>
  <!-- Y-axis labels -->
  <text x="60" y="34" fill="#475569" font-size="9" text-anchor="end">高</text>
  <text x="60" y="254" fill="#475569" font-size="9" text-anchor="end">0</text>
  <text x="32" y="145" fill="#475569" font-size="11" text-anchor="middle" transform="rotate(-90,32,145)">結合定数 αs(Q²)</text>
  <!-- X-axis labels -->
  <text x="620" y="254" fill="#475569" font-size="10" text-anchor="start">Q →</text>
  <text x="340" y="276" fill="#475569" font-size="10" text-anchor="middle">エネルギースケール Q（小 = 遠距離 ← → 大 = 近距離）</text>
  <!-- Reference points on x-axis -->
  <text x="141" y="263" fill="#94A3B8" font-size="8.5" text-anchor="middle">~1 GeV</text>
  <text x="213" y="263" fill="#94A3B8" font-size="8.5" text-anchor="middle">~3 GeV</text>
  <text x="342" y="263" fill="#94A3B8" font-size="8.5" text-anchor="middle">~10 GeV</text>
  <text x="535" y="263" fill="#94A3B8" font-size="8.5" text-anchor="middle">~50 GeV</text>
  <text x="610" y="263" fill="#94A3B8" font-size="8.5" text-anchor="middle">~120 GeV</text>
  <!-- Main α_s curve (manually fitted qualitative curve) -->
  <!-- Points: 70,30 138,74 193,109 268,144 342,166 417,180 516,193 610,202 -->
  <polyline points="70,30 138,74 193,109 268,144 342,166 417,180 516,193 610,202"
            fill="none" stroke="#7C3AED" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Annotations -->
  <text x="141" y="105" fill="#991B1B" font-size="10" font-weight="bold" text-anchor="middle">αs 大</text>
  <text x="141" y="118" fill="#7F1D1D" font-size="9" text-anchor="middle">離れると執着が強まる</text>
  <text x="141" y="129" fill="#7F1D1D" font-size="9" text-anchor="middle">（遠距離恋愛パラドックス）</text>
  <text x="490" y="160" fill="#1D4ED8" font-size="10" font-weight="bold" text-anchor="middle">αs 小</text>
  <text x="490" y="173" fill="#1E3A8A" font-size="9" text-anchor="middle">そばにいると冷静に</text>
  <text x="490" y="184" fill="#1E3A8A" font-size="9" text-anchor="middle">振る舞える</text>
  <!-- Nobel annotation -->
  <text x="580" y="197" fill="#64748B" font-size="8" text-anchor="middle">← 2004 Nobel</text>
</svg>