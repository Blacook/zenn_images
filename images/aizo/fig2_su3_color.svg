<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 390" style="font-family:'Helvetica Neue',Arial,sans-serif;background:#F8FAFC;border-radius:12px;border:1.5px solid #E2E8F0;display:block;margin:16px auto;max-width:540px;">
  <text x="270" y="26" fill="#0F172A" font-size="14" font-weight="bold" text-anchor="middle">SU(3) カラー対称性 — 愛の三原色と Color Singlet</text>
  <text x="270" y="42" fill="#64748B" font-size="10" text-anchor="middle">ハドロン（健全な関係）は3色が合わさって無色（Color Singlet）になっている</text>
  <circle cx="196" cy="185" r="108" fill="#EF4444" fill-opacity="0.20" stroke="#EF4444" stroke-width="2.2"/>
  <circle cx="344" cy="185" r="108" fill="#10B981" fill-opacity="0.20" stroke="#10B981" stroke-width="2.2"/>
  <circle cx="270" cy="298" r="108" fill="#3B82F6" fill-opacity="0.20" stroke="#3B82F6" stroke-width="2.2"/>
  <text x="125" y="165" fill="#B91C1C" font-size="17" font-weight="bold" text-anchor="middle">情熱</text>
  <text x="125" y="184" fill="#DC2626" font-size="12" text-anchor="middle">Red</text>
  <text x="125" y="200" fill="#64748B" font-size="10" text-anchor="middle">近接・短期的</text>
  <text x="415" y="165" fill="#065F46" font-size="17" font-weight="bold" text-anchor="middle">信頼</text>
  <text x="415" y="184" fill="#059669" font-size="12" text-anchor="middle">Green</text>
  <text x="415" y="200" fill="#64748B" font-size="10" text-anchor="middle">絆・長期的</text>
  <text x="270" y="358" fill="#1D4ED8" font-size="17" font-weight="bold" text-anchor="middle">尊敬</text>
  <text x="270" y="376" fill="#2563EB" font-size="12" text-anchor="middle">Blue / 対称性の守護</text>
  <circle cx="270" cy="218" r="3" fill="#7C3AED"/>
  <text x="270" y="207" fill="#1E293B" font-size="12" font-weight="bold" text-anchor="middle">Color Singlet</text>
  <text x="270" y="222" fill="#374151" font-size="10" text-anchor="middle">健全な長期関係</text>
  <text x="270" y="236" fill="#374151" font-size="10" text-anchor="middle">3色が調和した状態</text>
  <text x="270" y="150" fill="#78716C" font-size="9" text-anchor="middle">情熱＋信頼</text>
  <text x="183" y="268" fill="#78716C" font-size="9" text-anchor="middle">情熱＋尊敬</text>
  <text x="357" y="268" fill="#78716C" font-size="9" text-anchor="middle">信頼＋尊敬</text>
</svg>